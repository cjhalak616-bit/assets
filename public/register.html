<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    


    <style>

        body{
            background: linear-gradient(135deg,#3791b8,#14B8A6);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .register-card{
            border:none;
            border-radius:30px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
        }

        .left-panel{
            background:#EFF6FF;
            padding:50px;
            text-align:center;
        }

        .right-panel{
            background:white;
            padding:50px;
        }

        .form-control,
        .form-select{
            border-radius:15px;
            padding:14px;
        }

        .btn-register{
            background:#14B8A6;
            color:white;
            padding:14px;
            border-radius:15px;
            font-size:18px;
            font-weight:600;
        }

        .btn-register:hover{
            background:#0F766E;
            color:white;
        }

        .title{
            color:#3dacb1;
            font-weight:700;
        }

    </style>
</head>
<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-11">

<div class="card register-card">

<div class="row g-0">

<!-- Left Side -->
<div class="col-md-4 left-panel">

<img src="images/doctor.jpg"
class="img-fluid mb-4"
style="max-height:280px;">

<h2 class="title">Welcome!</h2>

<p class="text-muted">
Register yourself to book diabetic retinopathy screening appointments and keep track of your eye health records.
</p>

</div>

<!-- Right Side -->
<div class="col-md-8 right-panel">

<h2 class="text-center title mb-4">
<i class="bi bi-person-plus-fill"></i>
 Patient Registration
</h2>

<form id="registerForm">

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label" >Full Name</label>
<input type="text" id="full_name" class="form-control"
placeholder="Enter your full name">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Age</label>
<input type="number" id="age" class="form-control"
placeholder="Enter age">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Gender</label>
<select id="gender" class="form-select">
<option value=""selected disabled>Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Diabetes Type</label>
<select id="diabetes_type" class="form-select">
<option selected disabled>Select Type</option>
<option>Type 1</option>
<option>Type 2</option>
<option>Gestational</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">HbA1C Level</label>
<input type="number" step="0.1" id="hba1c_level" class="form-control"
placeholder="Example: 7.5">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Contact Number</label>
<input type="text" id="contact_number" class="form-control"
placeholder="Enter mobile number">
</div>

<div class="col-12 mb-3">
<label class="form-label">Email Address</label>
<input type="email" id="email" class="form-control"
placeholder="Enter email address">
</div>
<div class="col-12 mb-3">
    <label class="form-label">Password</label>
    <input type="password"
           id="password"
           class="form-control"
           placeholder="Enter password">
</div>

<div class="col-12 mb-4">
<label class="form-label">Address</label>
<textarea id="address" class="form-control"
rows="3"
placeholder="Enter your address"></textarea>
</div>

<div class="col-12">
<button type="submit"
        
        class="btn btn-register w-100">
    <i class="bi bi-check-circle-fill"></i>
    Register Now
</button>
</div>

</div>

</form>

<div class="text-center mt-4">
Already have an account?
<a href="login.html">Login Here</a>
</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/register.js"></script>

</body>
</html>
