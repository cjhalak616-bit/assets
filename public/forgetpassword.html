<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body{
    background: linear-gradient(135deg,#3791b8,#14B8A6);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.forgot-card{
    width:500px;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.title{
    color:#14B8A6;
    font-weight:700;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.btn-custom{
    background:#14B8A6;
    color:white;
    border-radius:12px;
    padding:12px;
    font-size:18px;
    font-weight:600;
}

.btn-custom:hover{
    background:#0F766E;
    color:white;
}

</style>

</head>
<body>

<div class="forgot-card">

    <div class="text-center mb-4">
        <i class="bi bi-shield-lock-fill fs-1 text-success"></i>

        <h2 class="title mt-3">
            Reset Password
        </h2>

        <p class="text-muted">
            Enter your registered email and create a new password.
        </p>
    </div>

    <div class="mb-3">
        <label class="form-label">Registered Email</label>
        <input type="email"
               id="email"
               class="form-control"
               placeholder="Enter email">
    </div>

    <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="password"
               id="newPassword"
               class="form-control"
               placeholder="Enter new password">
    </div>

    <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <input type="password"
               id="confirmPassword"
               class="form-control"
               placeholder="Confirm password">
    </div>

    <button class="btn btn-custom w-100"
            onclick="resetPassword()">
        <i class="bi bi-arrow-repeat"></i>
        Update Password
    </button>

    <div class="text-center mt-4">
        Remember your password?
        <a href="login.html">Login Here</a>
    </div>

</div>

<script>

function resetPassword(){

    const email = document.getElementById("email").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(email === "" || newPassword === "" || confirmPassword === ""){
        Swal.fire({
            icon:"warning",
            title:"Missing Fields",
            text:"Please fill all fields.",
            confirmButtonColor:"#14B8A6"
        });
        return;
    }

    if(newPassword !== confirmPassword){
        Swal.fire({
            icon:"error",
            title:"Passwords do not match",
            text:"Please enter the same password.",
            confirmButtonColor:"#14B8A6"
        });
        return;
    }

    fetch("http://localhost:3000/updatepassword",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            email: email,
            password: newPassword
        })
    })
    .then(response => response.text())
    .then(result => {

        if(result === "Password Updated Successfully"){

            Swal.fire({
                icon:"success",
                title:"Password Updated ",
                text:"Please login with your new password.",
                confirmButtonColor:"#14B8A6"
            }).then(()=>{
                window.location.href="login.html";
            });

        }
        else{

            Swal.fire({
                icon:"error",
                title:"Oops!",
                text: result,
                confirmButtonColor:"#14B8A6"
            });

        }

    })
    .catch(error=>{

        Swal.fire({
            icon:"error",
            title:"Server Error",
            text:"Something went wrong."
        });

    });

}

</script>

</body>
</html>
