<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Manage Patients</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
background:#f4fffe;
}

.header{
background:#0F766E;
color:white;
padding:20px;
}

.card{
border:none;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.btn-search{
background:#14B8A6;
color:white;
}

.btn-search:hover{
background:#0F766E;
color:white;
}

table{
vertical-align:middle;
}

.badge-confirm{
background:#22C55E;
}

.badge-pending{
background:#F59E0B;
}

.badge-cancel{
background:#EF4444;
}

</style>

</head>
<body>

<div class="header">

<div class="container">

<h2>
<i class="bi bi-search"></i>
Manage Patients
</h2>

</div>

</div>


<div class="container mt-5">

<div class="card p-4">

<div class="row g-3">

<div class="col-md-3">

<input
type="text"
id="search"
class="form-control"
placeholder="Search Name / ID">

</div>

<div class="col-md-2">

<input
type="date"
id="fromDate"
class="form-control">

</div>

<div class="col-md-2">

<input
type="date"
id="toDate"
class="form-control">

</div>

<div class="col-md-2">

<select
id="doctor"
class="form-select">

<option value="">All Doctors</option>

<option>Dr. Sharma</option>

<option>Dr. Gupta</option>

<option>Dr. Singh</option>

</select>

</div>

<div class="col-md-2">

<select
id="status"
class="form-select">

<option value="">All Status</option>

<option>Confirmed</option>

<option>Pending</option>

<option>Completed</option>

</select>

</div>

<div class="col-md-1">

<button
class="btn btn-search w-100"
onclick="filterTable()">

<i class="bi bi-search"></i>

</button>

</div>

</div>

<hr>

<div class="table-responsive">

<table class="table table-bordered table-hover text-center">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Patient</th>

<th>Date</th>

<th>Doctor</th>

<th>Status</th>

</tr>

</thead>

<tbody id="patientTable">

<tr>

<td>101</td>

<td>Rahul Sharma</td>

<td>2026-07-20</td>

<td>Dr. Sharma</td>

<td><span class="badge badge-confirm">Confirmed</span></td>

</tr>

<tr>

<td>102</td>

<td>Priya Singh</td>

<td>2026-07-25</td>

<td>Dr. Gupta</td>

<td><span class="badge badge-pending">Pending</span></td>

</tr>

<tr>

<td>103</td>

<td>Amit Verma</td>

<td>2026-08-01</td>

<td>Dr. Singh</td>

<td><span class="badge badge-confirm">Completed</span></td>

</tr>

<tr>

<td>104</td>

<td>Neha Kapoor</td>

<td>2026-08-05</td>

<td>Dr. Gupta</td>

<td><span class="badge badge-cancel">Cancelled</span></td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>

function filterTable(){

let search=document.getElementById("search").value.toLowerCase();

let doctor=document.getElementById("doctor").value;

let status=document.getElementById("status").value;

let rows=document.querySelectorAll("#patientTable tr");

rows.forEach(row=>{

let text=row.innerText.toLowerCase();

let show=true;

if(search!="" && !text.includes(search))

show=false;

if(doctor!="" && !text.includes(doctor.toLowerCase()))

show=false;

if(status!="" && !text.includes(status.toLowerCase()))

show=false;

row.style.display=show?"":"none";

});

}

</script>

</body>
</html>
