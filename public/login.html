<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>

        body{
            background: linear-gradient(135deg,#CCFBF1,#F0FDFA);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            border:none;
            border-radius:30px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,0.1);
        }

        .left-panel{
            background:linear-gradient(135deg,#14B8A6,#0F766E);
            color:white;
            padding:50px;
        }

        .right-panel{
            background:white;
            padding:50px;
        }

        .form-control{
            border-radius:15px;
            padding:14px;
        }

        .login-btn{
            background:#14B8A6;
            border:none;
            color:white;
            padding:14px;
            border-radius:15px;
            font-weight:600;
        }

        .login-btn:hover{
            background:#0F766E;
            color:white;
        }

        .forgot-link{
            color:#0F766E;
            text-decoration:none;
        }

        .forgot-link:hover{
            color:#14B8A6;
        }

    </style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card login-card">

<div class="row g-0">

    <!-- Left Side -->

    <div class="col-md-5 left-panel d-flex flex-column justify-content-center align-items-center text-center">

        <img src="images/login1.jpg"
        class="img-fluid mb-4"
        style="width:180px; height:auto;">

        <h2 class="fw-bold">
            Welcome Back!
        </h2>

        <p class="mt-3">
            Login to manage appointments, view reports and track your screening history.
        </p>

    </div>

    <!-- Right Side -->

    <div class="col-md-7 right-panel">

        <h2 class="text-center page-title mb-4">
            <i class="bi bi-person-circle"></i>
            Patient Login
        </h2>

        <form>

            <div class="mb-4">
                <label class="form-label">
                    Email Address
                </label>

                <input type="email" id="email"
                class="form-control"
                placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Password
                </label>

                <input type="password" id="password"
                class="form-control"
                placeholder="Enter your password">
            </div>

            <div class="d-flex justify-content-between mb-4">

                <div>
                    <input type="checkbox">
                    Remember Me
                </div>

                <a href="#" class="forgot-link">
                    Forgot Password?
                </a>

            </div>

            <button type="button"
             class="btn login-btn w-100"
             onclick="loginUser()">
                <i class="bi bi-box-arrow-in-right"></i>
                Login
            </button>

        </form>

        <div class="text-center mt-4">

            Don't have an account?

            <a href="register.html"
            class="text-decoration-none fw-bold"
            style="color:#0F766E;">
                Register Here
            </a>

        </div>

    </div>

</div>

</div>

</div>

</div>

</div>
<script>
function loginUser(){

    const data = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    fetch("http://localhost:3000/login",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(data)
    })
    .then(response => response.text())
    .then(result => {

        if(result === "Login Successful"){
            Swal.fire({
    icon: "success",
    title: "Welcome Back! ",
    text: "Login Successful",
    confirmButtonColor: "#14B8A6",
    background: "#ffffff",
    color: "#0F766E",
    timer: 2000,
    showConfirmButton: false
}).then(() => {
    window.location.href = "index.html";
});
           
        }
        else{
            Swal.fire({
    icon: "error",
    title: "Oops!",
    text: "Invalid Email or Password",
    confirmButtonColor: "#14B8A6"
});
        }

    })
    .catch(err=>{
        console.log(err);
    });
}
</script>

</body>
</html>
