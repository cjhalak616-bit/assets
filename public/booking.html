<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background: linear-gradient(135deg,#ccfbf1,#f0fdfa);
    min-height:100vh;
}

.booking-section{
    padding:60px 0;
}

.booking-card{
    background:#fff;
    border:none;
    border-radius:30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
    overflow:hidden;
}

.left-side{
    background:linear-gradient(135deg,#14B8A6,#0F766E);
    color:white;
    padding:50px;
}

.right-side{
    padding:50px;
}

.form-control,
.form-select{
    border-radius:15px;
    padding:14px;
    border:1px solid #d1d5db;
}

.form-control:focus,
.form-select:focus{
    border-color:#14B8A6;
    box-shadow:0 0 0 .25rem rgba(20,184,166,.25);
}

.btn-book{
    background:#14B8A6;
    color:white;
    padding:15px;
    border-radius:15px;
    font-size:18px;
    font-weight:600;
}

.btn-book:hover{
    background:#0F766E;
    color:white;
}

.title{
    color:#0F766E;
    font-weight:700;
}

.info-card{
    background:#f0fdfa;
    border-radius:20px;
    padding:20px;
    margin-bottom:30px;
}

</style>

</head>
<body>

<section class="booking-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card booking-card">

<div class="row g-0">

<!-- Left Side -->

<div class="col-md-4 left-side d-flex flex-column justify-content-center text-center">

<img src="images/appointment1.jpg"
class="img-fluid mb-4"
style="max-height:220px;">

<h2 class="fw-bold">
Eye Screening
</h2>

<p class="mt-3">
Book your diabetic retinopathy screening appointment and protect your vision through early detection.
</p>

</div>

<!-- Right Side -->

<div class="col-md-8 right-side">

<h2 class="title text-center mb-4">
<i class="bi bi-calendar2-check-fill"></i>
 Book Appointment
</h2>

<div class="info-card">

<h5 class="fw-bold text-success">
<i class="bi bi-info-circle-fill"></i>
 Appointment Information
</h5>

<p class="mb-0 text-muted">
Select your preferred clinic, date and time slot to schedule your eye screening.
</p>

</div>

<form>

<div class="mb-4">
<label class="form-label fw-semibold">
<i class="bi bi-hospital"></i>
 Select Clinic
</label>

<select class="form-select">
<option selected disabled>Choose Clinic</option>
<option>Apollo Hospital</option>
<option>City Eye Clinic</option>
<option>Vision Care Centre</option>
</select>
</div>

<div class="row">

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">
<i class="bi bi-calendar-event"></i>
 Appointment Date
</label>

<input type="date"
class="form-control">

</div>

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">
<i class="bi bi-clock"></i>
 Time Slot
</label>

<input type="time"
class="form-control">

</div>

</div>

<div class="mb-4">

<label class="form-label fw-semibold">
<i class="bi bi-eye-fill"></i>
 Screening Type
</label>

<select class="form-select">
<option selected disabled>Select Screening Type</option>
<option>Initial Screening</option>
<option>Follow-up Screening</option>
</select>

</div>

<div class="mb-4">

<label class="form-label fw-semibold">
<i class="bi bi-chat-left-text"></i>
 Additional Notes
</label>

<textarea
class="form-control"
rows="4"
placeholder="Write any special instructions..."></textarea>

</div>

<button class="btn btn-book w-100">
<i class="bi bi-check-circle-fill"></i>
 Confirm Appointment
</button>

</form>

</div>

</div>

</div>

</div>

</div>

</div>

</section>

</body>
</html>
