<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screening History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background: linear-gradient(135deg,#ccfbf1,#f0fdfa);
    min-height:100vh;
}

.history-card{
    background:white;
    border:none;
    border-radius:30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
    padding:40px;
}

.page-title{
    color:#0F766E;
    font-weight:700;
}

.search-box{
    border-radius:15px;
    padding:12px;
}

.table{
    border-radius:20px;
    overflow:hidden;
}

.table thead{
    background:#14B8A6;
    color:white;
}

.status-completed{
    background:#14B8A6;
}

.status-pending{
    background:#F59E0B;
}

.summary-card{
    border:none;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

</style>

</head>

<body>

<div class="container py-5">

<div class="history-card">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="page-title">
<i class="bi bi-clock-history"></i>
 Screening History
</h2>

<button class="btn btn-outline-success rounded-pill">
<i class="bi bi-download"></i>
 Export Report
</button>

</div>


<div class="row mb-4">

<div class="col-md-8">
<input type="text"
id="searchInput"
class="form-control search-box"
placeholder="🔍 Search by clinic or result...">
</div>

<div class="col-md-4">
<select id="filterResult" class="form-select search-box">
<option value="">All Results</option>
<option value="Normal">Normal</option>
<option value="Mild Retinopathy">Mild Retinopathy</option>
<option value="Moderate Retinopathy">Moderate Retinopathy</option>
<option value="Severe Retinopathy">Severe Retinopathy</option>
</select>
</div>

</div>


<div class="table-responsive">

<table class="table table-hover align-middle">

<thead>
<tr>
<th>Date</th>
<th>Clinic</th>
<th>Result</th>
<th>Recommendations</th>
<th>Status</th>
</tr>
</thead>

<tbody id="historyTable">

<tr>
<td colspan="5" class="text-center py-4">
<div class="spinner-border text-success" role="status"></div>
<div class="mt-2">Loading history...</div>
</td>
</tr>

</tbody>

</table>

</div>


<div class="row mt-5 text-center">

<div class="col-md-3 mb-3">
<div class="card summary-card p-3">
<h6 class="text-muted">Total Visits</h6>
<h2 id="totalVisits" class="text-success">0</h2>
</div>
</div>

<div class="col-md-3 mb-3">
<div class="card summary-card p-3">
<h6 class="text-muted">Completed</h6>
<h2 id="completedCount" class="text-success">0</h2>
</div>
</div>

<div class="col-md-3 mb-3">
<div class="card summary-card p-3">
<h6 class="text-muted">Pending</h6>
<h2 id="pendingCount" class="text-warning">0</h2>
</div>
</div>

<div class="col-md-3 mb-3">
<div class="card summary-card p-3">
<h6 class="text-muted">Reports</h6>
<h2 id="reportCount" class="text-primary">0</h2>
</div>
</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/historytracking.js"></script>

</body>
</html>
